# 数据库连接配置
spring.datasource.url=jdbc:mysql://localhost:3306/goods?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# 配置连接池
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
# ???? WEB ????
server.port=8080
#???????
# http://localhost:8080/goods/order/pay
server.servlet.context-path=/goods
# 恢复JSP视图解析器配置
spring.mvc.view.prefix=/
spring.mvc.view.suffix=.jsp
# 添加JSON支持配置
spring.mvc.converters.preferred-json-mapper=jackson
spring.jackson.serialization.indent-output=true
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
#mybatis:
#????????*Mapper.xml ?????
mybatis.mapper-locations=classpath:mappers/*Mapper.xml
#??Mybatis?????
mybatis.type-aliases-package=com.gg.goods.entity
#??????   Student   private  String   sId    #{sId}    s_id
mybatis.configuration.map-underscore-to-camel-case=true
#??Mybatis ???  ????
mybatis.configuration.lazy-loading-enabled=true
mybatis.configuration.aggressive-lazy-loading=false
#SQL??  ????
logging.level.com.gg.goods.mapper=debug
# 启用JMX服务
spring.jmx.enabled=true
spring.jmx.default-domain=com.gg.goods
spring.jmx.server.port=1099
spring.jmx.server.host=localhost
# 配置JMX bean注册
spring.jmx.unique-names=true
# 配置JMX远程访问
com.sun.management.jmxremote=true
com.sun.management.jmxremote.port=1099
com.sun.management.jmxremote.authenticate=false
com.sun.management.jmxremote.ssl=false
com.sun.management.jmxremote.local.only=false
com.sun.management.jmxremote.rmi.port=1099
# =============== 缓存配置 =================
# 启用Spring缓存
spring.cache.type=caffeine
# 启用缓存统计
spring.cache.cache-names=categories,books,stocks,users,orders,pages
# 缓存配置参数
# 分类缓存配置 - 长期缓存
cache.categories.max-size=200
cache.categories.expire-time=7200
cache.categories.time-unit=SECONDS
# 图书缓存配置 - 中期缓存
cache.books.max-size=2000
cache.books.expire-time=1800
cache.books.time-unit=SECONDS
# 库存缓存配置 - 短期缓存（高频更新）
cache.stocks.max-size=3000
cache.stocks.expire-time=180
cache.stocks.time-unit=SECONDS
# 用户缓存配置 - 中期缓存
cache.users.max-size=1500
cache.users.expire-time=1800
cache.users.time-unit=SECONDS
# 订单缓存配置 - 短期缓存
cache.orders.max-size=5000
cache.orders.expire-time=600
cache.orders.time-unit=SECONDS
# 页面缓存配置 - 中期缓存
cache.pages.max-size=1000
cache.pages.expire-time=900
cache.pages.time-unit=SECONDS
# 缓存性能调优参数
cache.statistics.enabled=true
cache.eviction.policy=SIZE_BASED_AND_TIME_BASED
# 缓存预热配置
cache.warmup.enabled=true
cache.warmup.categories=true
cache.warmup.books=true
cache.warmup.priority=HIGH
# 缓存异常处理
cache.exception.strategy=log_and_proceed
cache.exception.max-retries=3
cache.exception.retry-interval=100

